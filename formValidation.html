<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
</head>
<body>

    <form id="form">
        <input type="text" id="username" placeholder="Enter Username">
        <p id="userMessage" style="color:red;"></p>

        <input type="password" id="password" placeholder="Enter Password">
        <p id="passMessage" style="color:red;"></p>

        <button type="submit">Login</button>
    </form>

    <script>
        const form = document.getElementById("form");
        const username = document.getElementById("username");
        const password = document.getElementById("password");

        const userMessage = document.getElementById("userMessage");
        const passMessage = document.getElementById("passMessage");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            userMessage.textContent = "";
            passMessage.textContent = "";

            if (username.value.trim() === "") {
                userMessage.textContent = "Username is required!";
                return;
            }

            if (username.value.trim().length < 6) {
                userMessage.textContent = "Username must be at least 6 characters!";
                return;
            }

            if (password.value.trim() === "") {
                passMessage.textContent = "Password is required!";
                return;
            }

            if (password.value.trim().length < 8) {
                passMessage.textContent = "Password must be at least 8 characters!";
                return;
            }

            alert("Login Successful!");
        });
    </script>

</body>
</html>
