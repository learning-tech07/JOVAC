<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tech Store</title>
    <style>
        /* --- Base Reset --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #f4f7f6;
    color: #333;
    padding: 30px 20px;
}

/* --- Main Container --- */
.app-container {
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
}

h1 {
    font-size: 2.5rem;
    color: #2c3e50;
    margin-bottom: 20px;
}

/* --- Search Box Area --- */
.search-box {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
}

#searchInput {
    width: 100%;
    max-width: 400px;
    padding: 12px 20px;
    font-size: 1rem;
    border: 2px solid #ccc;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.3s ease;
}

#searchInput:focus {
    border-color: #3498db;
}

#searchBtn {
    padding: 12px 24px;
    font-size: 1rem;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.3s ease;
}

#searchBtn:hover {
    background-color: #2980b9;
}

/* --- Utility Classes (State Management) --- */
.hidden {
    display: none !important;
}

#loadingIndicator {
    font-size: 1.2rem;
    color: #f39c12;
    margin: 20px 0;
    font-weight: bold;
}

.error-text {
    font-size: 1.2rem;
    color: #e74c3c;
    background-color: #fadbd8;
    padding: 15px;
    border-radius: 8px;
    margin: 20px auto;
    max-width: 600px;
    border: 1px solid #e74c3c;
}

/* --- CSS Grid for Products --- */
.grid-container {
    display: grid;
    /* Responsive Grid: Auto-adjusts columns based on screen size */
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px 0;
}

/* --- Product Cards --- */
.product-card {
    background-color: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    text-align: left;
    display: flex;
    flex-direction: column;
}

.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
}

.product-card img {
    width: 100%;
    height: 200px;
    object-fit: contain; /* Prevents image stretching */
    margin-bottom: 15px;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
}

.product-card h3 {
    font-size: 1.2rem;
    color: #2c3e50;
    margin-bottom: 10px;
    /* Truncate long titles with ... */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.product-card p {
    font-size: 1rem;
    color: #555;
    margin-bottom: 5px;
}

.product-card p:nth-of-type(1) {
    font-weight: bold;
    color: #27ae60; /* Green color for Price */
    font-size: 1.1rem;
}
    </style>
</head>
<body>
    <div class="app-container">
    <h1>Tech Store Explorer</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products (e.g. laptop)..." />
        <button id="searchBtn">Search</button>
    </div>

    <div id="loadingIndicator" class="hidden">⏳ Fetching latest products...</div>
    <div id="errorMessage" class="hidden error-text"></div>
    
    <div id="productGrid" class="grid-container"></div>
</div>

<script>
    const searchInput = document.getElementById("searchInput")
const serachBtn = document.getElementById("searchBtn")
const producutGrid = document.getElementById('productGrid')
const loadingIndicator = document.getElementById('loadingIndicator')
const errorMessage = document.getElementById('errorMessage')

const API_Url = 'https://dummyjson.com/products/search?q='

function showLoading(){
    loadingIndicator.classList.remove('hidden')
    producutGrid.innerHTML = '',
    errorMessage.classList.add('hidden')
}

function hideLoading(){
    loadingIndicator.classList.add('hidden')
}

function shwoError(message){
    hideLoading()
    errorMessage.textContent=`opps:${message}`
    errorMessage.classList.remove('hidden')
}

function renderProducts(productsArray){
    // console.log(productsArray)
    hideLoading();
    producutGrid.innerHTML ='';

    if(productsArray.length === 0){
        producutGrid.innerHTML= '<h2>No prdouct found! try another search</h2>'
           return   
    }
    productsArray.forEach(product=>{
        console.log(product)
        const card = document.createElement('div')
        card.className= 'product-card'
        card.innerHTML=
        `
        
        <img src="${product.thumbnail}" alt="${product.title}" width='100%'>
    
        <h3>${product.title}</h3>
        <p>Price:$${product.price}</p>
        <p>.${product.rating}</p>
        `;
        producutGrid.appendChild(card)
    })
}


async function fetchProducts(searchQuery = ''){
    showLoading();
    try {
       const response = await fetch(`${API_Url}${searchQuery}`) 
       if(!response.ok){
        throw new Error(`Server returned status:${response.status}`)
    }
    const data = await response.json()
    console.log(data)
    renderProducts(data.products)
    } catch (error) {
        console.log("fetch process failed:" , error)
        shwoError("failed to fecth product")
    }
}

searchBtn.addEventListener('click' , ()=>{
    const query = searchInput.value.trim()
    fetchProducts(query)
})
searchBtn.addEventListener('keyup' , (event)=>{
     if(event.key === 'Enter'){
        fetchProducts(searchInput.value.trim())
    }
})

fetchProducts('')

</script>
</body>
</html>
