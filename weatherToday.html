<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: linear-gradient(to bottom, #fdfbfb, #ebedee);
    min-height: 100vh;
    
        }

        #title {
    display: flex;
    height: 10rem;
    width: 100%;
    align-items: center;
    justify-content: center;

    background-image: linear-gradient(
        rgba(0,0,0,0.3),
        rgba(0,0,0,0.3)
    ),
    url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");

    background-size: cover;
    background-position: center;

    color: white;
    font-size: xx-large;
    text-shadow: 2px 2px 8px black;
}

        #container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 20rem;
            gap: 20px;
        }

        #textInput {
            height: 50px;
            width: 300px;
            border-radius: 7px;
            text-align: center;
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        #textInput:hover {
            transform: scale(1.05);
        }

        #searchBtn {
            height: 50px;
            width: 110px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s ease;
            background-color: rgb(55, 27, 27);
            color: white;
        }

        #searchBtn:hover {
            transform: scale(1.1);
        }

        #result{
    display: flex;
    min-height: 150px;
    width: 80%;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);

    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);

    align-items: center;
    justify-content: center;

    border-radius: 15px;
    margin: -50px auto 20px;
    padding: 20px;

    font-size: 20px;
    text-align: center;
}
    </style>
</head>

<body>

    <div id="title">
        <h1>Weather Today</h1>
    </div>

    <div id="container">
        <input id="textInput" type="text" placeholder="Enter City">
        <button id="searchBtn">Search</button>
    </div>

    <div id="result">
        Search a city to see weather 🌤️
    </div>

    <script>
        const textInput = document.getElementById("textInput");
        const searchBtn = document.getElementById("searchBtn");
        const result = document.getElementById("result");

        const API_KEY = "a0952dcff1cc13b5595e999f227bc6b0";

        async function getWeather(city) {

            result.innerHTML = "<h2>Loading...</h2>";

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
                );

                const data = await response.json();

                if (data.cod === 404) {
                    result.innerHTML = "<h2>City not found!</h2>";
                    return;
                }

                result.innerHTML = `
                    <div>
                        <h2>${data.name}</h2>
                        <p>🌡 Temperature: ${data.main.temp}°C</p>
                        <p>🤗 Feels Like: ${data.main.feels_like}°C</p>
                        <p>☁ Weather: ${data.weather[0].main}</p>
                        <p>💧 Humidity: ${data.main.humidity}%</p>
                        <p>🌬 Wind Speed: ${data.wind.speed} m/s</p>
                    </div>
                `;

            } catch (error) {
                result.innerHTML = "<h2>Something went wrong!</h2>";
            }
        }

        searchBtn.addEventListener("click", () => {
            const city = textInput.value.trim();

            if (city === "") {
                result.innerHTML = "<h2>Please enter a city.</h2>";
                return;
            }

            getWeather(city);
        });

        textInput.addEventListener("keyup", (event) => {
            if (event.key === "Enter") {
                const city = textInput.value.trim();

                if (city === "") {
                    result.innerHTML = "<h2>Please enter a city.</h2>";
                    return;
                }

                getWeather(city);
            }
        });
    </script>

</body>
</html>
